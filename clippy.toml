# Clippy configuration
#
# This file configures which lints are allowed in the codebase.
# Some warnings are disabled due to:
# - Pre-existing technical debt that would require significant refactoring
# - False positives for our specific use cases
# - Low-priority warnings that don't affect correctness

# These are allowed (not warned about)
allow = [
    # Useful in certain contexts for documentation
    "doc_markdown",

    # Our use cases require explicit indexing in some places
    "explicit_counter_loop",

    # We have legitimate use cases for expect/unwrap in tests
    "expect_used",
    "unwrap_used",

    # Some type complexity is necessary for our domain
    "type_complexity",
]

# These are warned against but won't fail the build
warn = [
    # TODO: These should be fixed eventually
    "redundant_closure",
    "module_name_repetitions",
]

# These will trigger a compiler error
deny = [
    # TODO: Re-enable warnings once pre-existing issues are fixed
    # For now, we allow some warnings to unblock CI
]

# Max line length for code (warning)
max-trait-bounds = 10
